# Render Blueprint. Push this repo to GitHub, then in Render:
#   New + -> Blueprint -> pick this repo. Render reads this file and creates
#   the service. Fill the secret values (sync:false) in the dashboard.
services:
  - type: web
    name: arbiter-pr-review
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      # Secrets — set these in the Render dashboard, NOT in this file.
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      # Paste the FULL .pem contents (multiline is fine). Do NOT set
      # GITHUB_PRIVATE_KEY_PATH on the host — there's no file there.
      - key: GITHUB_PRIVATE_KEY
        sync: false
      # Non-secret config can live here.
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      # RAG: connection string is injected from the managed Postgres below.
      # Render's Postgres supports the pgvector extension (CREATE EXTENSION vector).
      - key: DATABASE_URL
        fromDatabase:
          name: arbiter-db
          property: connectionString
      - key: EMBEDDING_MODEL
        value: models/text-embedding-004
      - key: EMBEDDING_DIM
        value: "768"

databases:
  - name: arbiter-db
    plan: free
    postgresMajorVersion: "16"
